@if (visible) {
  <div class="rylo-overlay" role="dialog" aria-modal="true" aria-labelledby="rylo-overlay-title">
    <div class="rylo-overlay__content">
      <div class="rylo-overlay__text">
        <h1 id="rylo-overlay-title" class="rylo-overlay__title">sign.Translate is now Sign Translate by Rylo.</h1>
        <p class="rylo-overlay__subtitle">We have our name and looks but your experience stays the same.</p>
      </div>
      <a class="rylo-overlay__cta" [href]="redirectUrl" (click)="redirect($event)" autofocus>Try Sign Translate</a>
    </div>
  </div>
}
